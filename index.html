<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小时光</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小时光">
<meta name="theme-color" content="#FDF8F2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #FDF8F2;
  --bg2:    #FFFFFF;
  --bg3:    #F6EDE1;
  --bg4:    #EDE0D0;
  --border: #EAD8C4;
  --border2:#D9C0A6;
  --text:   #2C1A0A;
  --text2:  #7A5538;
  --text3:  #B09070;
  --accent: #C8582A;
  --accent2:rgba(200,88,42,.13);
  --accent3:rgba(200,88,42,.07);
  --green:  #4A9468;
  --green2: rgba(74,148,104,.13);
  --blue:   #4478A0;
  --blue2:  rgba(68,120,160,.13);
  --purple: #836AAA;
  --purple2:rgba(131,106,170,.13);
  --amber:  #B87C20;
  --amber2: rgba(184,124,32,.13);
  --red:    #B83C3C;
  --red2:   rgba(184,60,60,.13);
  --serif:  'Lora', Georgia, serif;
  --sans:   'Noto Sans SC', -apple-system, sans-serif;
  --r:      16px;
  --r-sm:   10px;
  --shadow: 0 1px 6px rgba(44,26,10,.07);
  --shadow2:0 4px 20px rgba(44,26,10,.11);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── SETUP ───────────────────────────────── */
#view-setup{height:100dvh;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px 48px;max-width:480px;margin:0 auto}
.setup-icon{font-size:60px;margin-bottom:16px;text-align:center}
.setup-title{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--text);margin-bottom:8px;text-align:center}
.setup-desc{font-size:13px;color:var(--text2);line-height:1.8;text-align:center;margin-bottom:28px}
.form-group{width:100%;margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px;display:block}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}
.input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--text3)}

/* ── MAIN APP ────────────────────────────── */
#app-main{display:none;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}

/* Header */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 18px 10px;flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-brand{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--accent);letter-spacing:-.01em}
.hdr-info{text-align:right}
.hdr-date{font-size:11px;color:var(--text3)}
.hdr-child{font-size:11px;color:var(--text2);margin-top:1px}
.token-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--text3);margin-top:2px}
.token-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}

/* Scroll area */
.scroll-area{flex:1;overflow-y:auto;padding:16px 16px 24px;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{width:2px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Bottom Nav */
.bot-nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 7px;font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;transition:color .15s;font-family:var(--sans)}
.nav-btn .ni{font-size:20px;line-height:1}
.nav-btn.on{color:var(--accent)}

/* Views */
.view{display:none}.view.on{display:block}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.sec-title{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:active{opacity:.8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:none;border:1.5px solid var(--border);color:var(--text2)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-full{width:100%}
.btn-green{background:var(--green)}
.btn-purple{background:var(--purple)}

/* Chips */
.chip{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.chip-acc{background:var(--accent2);color:var(--accent)}
.chip-grn{background:var(--green2);color:var(--green)}
.chip-amb{background:var(--amber2);color:var(--amber)}

/* Spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
.spinner-dark{border-color:var(--border);border-top-color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DASHBOARD ───────────────────────────── */
.dash-greeting{font-family:var(--serif);font-size:21px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3}
.dash-sub{font-size:12px;color:var(--text3);margin-bottom:18px}

.mood-row{display:flex;gap:6px;justify-content:space-between}
.mood-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 2px;background:var(--bg3);border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all .15s;font-size:10px;color:var(--text3);font-family:var(--sans)}
.mood-btn .me{font-size:22px;line-height:1}
.mood-btn.on{border-color:var(--accent);background:var(--accent2);color:var(--accent)}

.tag-grid{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.tag-chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:none;color:var(--text3);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.tag-chip.on{border-color:var(--accent);background:var(--accent2);color:var(--accent)}

/* ── STORY ───────────────────────────────── */
.lang-toggle{display:flex;gap:6px;margin-bottom:16px}
.lang-btn{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:8px;background:none;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;font-family:var(--sans);font-weight:500}
.lang-btn.on{border-color:var(--accent);background:var(--accent2);color:var(--accent)}

.story-title{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.4}
.story-body{font-family:var(--serif);font-size:15px;color:var(--text);line-height:2;white-space:pre-wrap}
.story-goodnight{margin-top:20px;padding:14px 18px;background:linear-gradient(135deg,var(--accent3),transparent);border:1px solid var(--accent2);border-radius:12px;font-size:14px;color:var(--accent);font-style:italic;text-align:center;line-height:1.6}
.story-summary{margin-top:12px;padding:12px 14px;background:var(--bg3);border-radius:10px;font-size:12px;color:var(--text3);line-height:1.7}

.topic-q{padding:7px 0;border-bottom:1px dashed var(--border);font-size:13px;color:var(--text2);line-height:1.5}
.topic-q:last-of-type{border-bottom:none}
.topic-benefit{font-size:11px;color:var(--text3);margin-top:10px;font-style:italic;line-height:1.5}

/* ── TIPS ────────────────────────────────── */
.tip-big{background:linear-gradient(145deg,#FFF3EC,var(--bg2));border:1.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.tip-title{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.4}
.tip-content{font-size:13px;color:var(--text2);line-height:1.8}
.tip-action{margin-top:12px;padding:10px 13px;background:var(--green2);border-radius:10px;font-size:12px;color:var(--green);line-height:1.6}
.tip-star{font-size:20px;color:var(--border2);cursor:pointer;transition:color .15s;line-height:1}
.tip-star.on{color:var(--amber)}
.hist-item{padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.hist-item:last-child{border-bottom:none}
.hist-title{font-size:13px;font-weight:500;color:var(--text)}
.hist-date{font-size:11px;color:var(--text3);margin-top:2px}

/* ── DIARY ───────────────────────────────── */
.mood-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.mood-cell{aspect-ratio:1;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;position:relative}
.mood-cell.today{outline:2px solid var(--accent);outline-offset:1px}
.mood-cell.has-data{background:var(--accent3)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;text-align:center}
.stat-val{font-size:22px;margin-bottom:3px}
.stat-label{font-size:10px;color:var(--text3)}
.insight-box{background:var(--purple2);border-radius:12px;padding:14px 16px;margin-top:14px;font-size:13px;color:var(--text2);line-height:1.8}
.insight-title{font-size:10px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* ── RECORDS ─────────────────────────────── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px}
.filter-row::-webkit-scrollbar{display:none}
.event-item{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--border)}
.event-item:last-child{border-bottom:none}
.event-icon{font-size:18px;flex-shrink:0;margin-top:2px}
.event-body{flex:1;min-width:0}
.event-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.event-meta{font-size:11px;color:var(--text3);margin-top:2px}
.event-symptom-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.s-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--text3)}
.del-btn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1}

/* ── MODAL ───────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(44,26,10,.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;padding:20px 20px calc(32px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:88vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:38px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--text);margin-bottom:18px}
.form-section{margin-bottom:14px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.cat-btn{padding:11px;border:1.5px solid var(--border);border-radius:10px;background:none;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--sans);text-align:center}
.cat-btn.on{border-color:var(--accent);background:var(--accent2);color:var(--accent);font-weight:600}

/* ── STATES ──────────────────────────────── */
.empty{text-align:center;padding:44px 20px;color:var(--text3);font-size:13px;line-height:2}
.empty-icon{font-size:40px;display:block;margin-bottom:10px}
.generating{text-align:center;padding:44px 20px;color:var(--text3);font-size:13px}
.gen-icon{font-size:40px;display:block;margin-bottom:12px;animation:pulse 1.8s ease infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(.95)}50%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease}
</style>
</head>
<body>

<!-- ════ SETUP ════ -->
<div id="view-setup">
  <div class="setup-icon">🌙</div>
  <h1 class="setup-title">小时光</h1>
  <p class="setup-desc">记录宝宝每一天的小故事<br>陪你做更从容的妈妈</p>
  <div class="form-group">
    <label class="form-label">宝宝的小名</label>
    <input class="input" id="setupName" placeholder="比如：宝宝、豆豆、小宇">
  </div>
  <div class="form-group">
    <label class="form-label">宝宝生日</label>
    <input class="input" id="setupBday" type="date">
  </div>
  <div class="form-group">
    <label class="form-label">DeepSeek API Key</label>
    <input class="input" id="setupKey" type="password" placeholder="sk-...">
    <div class="form-hint">用于生成故事和育儿知识，仅存储在本地，不会上传任何服务器</div>
  </div>
  <button class="btn btn-full" onclick="setupSave()" style="margin-top:8px">开始使用 →</button>
</div>

<!-- ════ MAIN APP ════ -->
<div id="app-main">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-brand">小时光 🌿</div>
      <div class="hdr-info">
        <div class="hdr-date" id="hdrDate"></div>
        <div class="hdr-child" id="hdrChild"></div>
        <div class="token-badge"><span class="token-dot"></span><span id="tokenCount">0</span>k tokens</div>
      </div>
    </div>
  </div>

  <!-- Scroll content -->
  <div class="scroll-area" id="scrollArea">

    <!-- ─ DASHBOARD ─ -->
    <div class="view on" id="view-dash">
      <div id="dashGreeting"></div>
      <div id="dashMood"></div>
      <div id="dashTipCard"></div>
      <div id="dashStoryCard"></div>
      <div id="dashEvents"></div>
    </div>

    <!-- ─ STORY ─ -->
    <div class="view" id="view-story">
      <div id="storyContent"></div>
    </div>

    <!-- ─ TIPS ─ -->
    <div class="view" id="view-tips">
      <div id="tipsContent"></div>
    </div>

    <!-- ─ DIARY ─ -->
    <div class="view" id="view-diary">
      <div id="diaryContent"></div>
    </div>

    <!-- ─ RECORDS ─ -->
    <div class="view" id="view-records">
      <div id="recordsContent"></div>
    </div>

  </div><!-- /scroll-area -->

  <!-- Bottom nav -->
  <div class="bot-nav">
    <button class="nav-btn on" onclick="gotoTab('dash')"><span class="ni">🏠</span>首页</button>
    <button class="nav-btn"    onclick="gotoTab('story')"><span class="ni">📖</span>故事</button>
    <button class="nav-btn"    onclick="gotoTab('tips')"><span class="ni">💡</span>知识</button>
    <button class="nav-btn"    onclick="gotoTab('diary')"><span class="ni">😊</span>日记</button>
    <button class="nav-btn"    onclick="gotoTab('records')"><span class="ni">📋</span>记录</button>
  </div>
</div>

<!-- ════ MODAL OVERLAY ════ -->
<div class="overlay" id="overlay" onclick="closeModal()">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const DS_BASE = 'https://api.deepseek.com/v1/chat/completions';

const MOODS = [
  {emoji:'😊', label:'开心'},
  {emoji:'😐', label:'平静'},
  {emoji:'😤', label:'烦躁'},
  {emoji:'😢', label:'难过'},
  {emoji:'😡', label:'大闹'},
];
const TRIGGERS = ['起床','吃饭','上学','放学','洗澡','睡觉','玩耍','看视频','被拒绝','分享','换衣服'];
const CAT_ICON  = {生病:'🏥', 疫苗:'💉', 里程碑:'🎯', 其他:'📋'};
const ELEMENTS_CN = [
  '小火箭','宇宙飞船','会说话的恐龙','魔法汽车','勇敢的小狮子','神秘的星球','海底王国','会飞的摩托车','友好的外星人','萤火虫森林',
  '云朵上的小火车','爱唱歌的鲸鱼','会变色的变色龙','月亮上的面包店','骑自行车的企鹅','彩虹桥上的邮局','树洞里的图书馆','会做饭的机器人',
  '住在鞋子里的蚂蚁一家','夜晚会发光的蘑菇','爱冒险的小章鱼','沙漠里的绿洲花园','飞行背包','时光倒流的怀表','会走路的房子',
  '冰淇淋星球','地下恐龙城市','超级快递员猫头鹰','彩色泡泡组成的城堡','和影子交朋友','会讲笑话的石头','倒着长的大树',
  '纸飞机环球旅行','星星工厂','消防员小松鼠','潜水艇去北极','雪人去海边度假','种子变成巨树','睡着的火山醒了'
];
const ELEMENTS_EN = [
  'a little rocket','a friendly spaceship','a talking dinosaur','a magic race car','a brave lion cub','a mysterious planet','the underwater kingdom','a flying motorcycle','a friendly alien','a glowing firefly forest',
  'a train on the clouds','a whale who loves singing','a color-changing chameleon','a bakery on the moon','a penguin riding a bicycle','a post office on a rainbow bridge','a library inside a tree hole','a cooking robot',
  'an ant family living in a shoe','glowing mushrooms at night','an adventurous little octopus','an oasis garden in the desert','a flying backpack','a time-rewinding pocket watch','a walking house',
  'an ice cream planet','an underground dinosaur city','an owl super-courier','a castle made of colorful bubbles','making friends with shadows','a stone that tells jokes','an upside-down tree',
  'a paper airplane world trip','a star factory','a firefighter squirrel','a submarine going to the North Pole','a snowman on a beach vacation','a seed growing into a giant tree','a sleeping volcano waking up'
];
const STORY_GENRES = ['冒险探索','友谊互助','解决问题','勇气成长','好奇心探究','助人为乐','克服害怕','团队合作','想象创造','自然科普'];
const STORY_STRUCTURES = [
  '主角遇到难题→想办法→成功解决→开心入睡',
  '主角和新朋友相遇→一起冒险→收获友谊→温暖告别',
  '主角发现一个奇妙的地方→探索→学到新东西→带着快乐回家',
  '主角犯了小错误→意识到问题→勇敢弥补→被原谅后安心入睡',
  '主角帮助别人→过程中遇到困难→坚持不放弃→大家一起庆祝',
  '主角害怕一件事→慢慢了解它→发现其实不可怕→安心入睡',
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S = {
  key:'', childName:'', childBirthday:'',
  dailyTip:   null,   // {date, title, content, actionTip, starred}
  dailyStory: null,   // {date, cn:{title,body,goodnightMsg}|null, en:{title,body,goodnightMsg,summary}|null}
  dailyTopic: null,   // {date, topic, questions:[], benefit}
  tipHistory: [],     // [{date, title, content, actionTip, starred}]
  moodLog:    [],     // [{date, mood, triggers:[], note}]
  events:     [],     // [{id, date, category, description, note, symptoms:[], vaccineName}]
  storyHistory:[],    // [{date, title, lang}] for de-duplication
  totalTokens:0,
};

// ── PERSISTENCE ───────────────────────────
function load() {
  try { const d = localStorage.getItem('xsg_v1'); if (d) Object.assign(S, JSON.parse(d)); } catch(e) {}
}
function save() {
  try { localStorage.setItem('xsg_v1', JSON.stringify(S)); } catch(e) {}
}

// ── HELPERS ───────────────────────────────
const todayStr = () => new Date().toISOString().slice(0, 10);
const isTodayData = d => d && d.date === todayStr();

function fmtDate(ds) {
  const d = new Date(ds + 'T00:00:00');
  const w = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getMonth()+1}月${d.getDate()}日 周${w}`;
}

function getChildAgeNum() {
  if (!S.childBirthday) return 4;
  const b = new Date(S.childBirthday), n = new Date();
  let y = n.getFullYear() - b.getFullYear();
  let m = n.getMonth() - b.getMonth();
  if (m < 0) { y--; m += 12; }
  if (n.getDate() < b.getDate()) m--;
  // Round up when within 3 months of next birthday (developmental content should target ahead)
  if (m >= 9) y++;
  return Math.max(2, Math.min(7, y));
}

function getChildAgeLabel() {
  if (!S.childBirthday) return '约4岁';
  const b = new Date(S.childBirthday), n = new Date();
  let y = n.getFullYear() - b.getFullYear();
  let m = n.getMonth() - b.getMonth();
  if (m < 0) { y--; m += 12; }
  return m > 0 ? `${y}岁${m}个月` : `${y}岁`;
}

function pickRandom(arr, n) {
  return [...arr].sort(() => Math.random() - .5).slice(0, n);
}

function updateTokenDisplay() {
  const el = document.getElementById('tokenCount');
  if (el) el.textContent = S.totalTokens > 999 ? Math.round(S.totalTokens / 1000) + 'k' : S.totalTokens;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 6)  return '深夜了';
  if (h < 11) return '早上好';
  if (h < 14) return '中午好';
  if (h < 18) return '下午好';
  return '晚上好';
}

// ── API ───────────────────────────────────
async function ds(sys, usr, maxTokens = 900) {
  const resp = await fetch(DS_BASE, {
    method: 'POST',
    headers: {'Content-Type':'application/json','Authorization':`Bearer ${S.key}`},
    body: JSON.stringify({
      model: 'deepseek-chat', max_tokens: maxTokens, temperature: 0.75,
      messages: [{role:'system',content:sys},{role:'user',content:usr}]
    })
  });
  if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(e.error?.message || `HTTP ${resp.status}`); }
  const data = await resp.json();
  if (data.usage) { S.totalTokens += (data.usage.total_tokens||0); save(); updateTokenDisplay(); }
  return data.choices[0].message.content;
}

async function dsJSON(sys, usr, max = 900) {
  const raw = await ds(sys, usr, max);
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

  renderDashMood();

function setStoryLang(lang) { storyLang = lang; renderStory(); }

async function genStory() {
  const age = getChildAgeNum();
  const isEn = storyLang === 'en';
  const elements = pickRandom(isEn ? ELEMENTS_EN : ELEMENTS_CN, 3);
  const genre = pickRandom(STORY_GENRES, 1)[0];
  const structure = pickRandom(STORY_STRUCTURES, 1)[0];

  // Collect recent story titles to avoid repetition
  const recentTitles = [];
  if (S.storyHistory) S.storyHistory.slice(0, 8).forEach(h => { if(h.title) recentTitles.push(h.title); });

  document.getElementById('storyContent').innerHTML = buildStoryLoadingHtml();

  try {
    let story;
    const avoidStr = recentTitles.length ? `\n\n【重要】以下是最近讲过的故事标题，请务必创作完全不同的新故事，不要重复类似的主角、场景或剧情：\n${recentTitles.join('\n')}` : '';

    if (!isEn) {
      story = await dsJSON(
        '你是一位富有想象力的儿童故事作家，每次都创作风格和内容完全不同的全新故事。内容安全正向，绝无暴力恐怖或不适合儿童的元素。仅返回JSON，不含任何其他文字。',
        `为${age}岁男孩写一个温馨睡前故事。
主题方向：${genre}
故事结构：${structure}
融入以下元素中的2-3个：${elements.join('、')}
要求：故事要有具体的主角名字，有生动的场景细节，节奏从活泼到平静适合入睡。约700-900字。${avoidStr}
JSON格式：{"title":"...","body":"...","goodnightMsg":"..."}`,
        1300
      );
    } else {
      story = await dsJSON(
        'You are an imaginative children\'s story writer who creates completely different stories each time. Content must be safe and positive — absolutely no violence, scary or inappropriate content. Return ONLY JSON, no other text.',
        `Write a cozy bedtime story for a ${age}-year-old boy.
Theme: ${genre}
Structure: ${structure}
Include 2-3 of these elements: ${elements.join(', ')}
Requirements: Give the main character a specific name, include vivid scene details, pace from lively to calm for sleep. ~500 words. Also add a brief Chinese summary under 80 chars.${avoidStr}
JSON: {"title":"...","body":"...","goodnightMsg":"...","summary":"（中文摘要：...）"}`,
        1200
      );
    }

    if (!S.dailyStory || !isTodayData(S.dailyStory)) S.dailyStory = {date:todayStr(), cn:null, en:null};
    S.dailyStory[storyLang] = story;
    // Track history for de-duplication
    if (!S.storyHistory) S.storyHistory = [];
    S.storyHistory.unshift({date:todayStr(), title:story.title, lang:storyLang});
    if (S.storyHistory.length > 30) S.storyHistory = S.storyHistory.slice(0, 30);
    save();
    renderStory();
    renderDashStoryCard();
  } catch(e) {
    document.getElementById('storyContent').innerHTML = errHtml('故事生成失败：' + e.message, 'genStory()');
  }
}

function buildStoryLoadingHtml() {
  return `
    <div class="lang-toggle">
      <button class="lang-btn ${storyLang==='cn'?'on':''}" onclick="setStoryLang('cn')">🇨🇳 中文故事</button>
      <button class="lang-btn ${storyLang==='en'?'on':''}" onclick="setStoryLang('en')">🇬🇧 English Story</button>
    </div>
    <div class="generating"><span class="gen-icon">🌙</span>正在为${S.childName}创作今晚故事…</div>`;
}

function regenStory() {
  if (S.dailyStory) S.dailyStory[storyLang] = null;
  save(); genStory();
}

async function genTopic() {
  const age = getChildAgeNum();
  try {
    const t = await dsJSON(
      '你是儿童教育专家。仅返回JSON，不含其他文字。',
      `为${age}岁男孩推荐一个今天的亲子聊天话题。类型随机：情感类/想象力类/生活认知类/社交类。\nJSON：{"topic":"...（话题标题，可以是一个有趣的问题）","questions":["引导问题1","引导问题2","引导问题3"],"benefit":"...（对孩子成长的好处，15字内）"}`,
      400
    );
    S.dailyTopic = {date:todayStr(), ...t};
    save();
    renderStory();
  } catch(e) { alert('生成失败，请稍后重试'); }
}

  '4岁孩子的友谊概念','分享不应该被强迫','幼儿园社交冲突的引导',
  '孩子被排挤时怎么做','角色扮演游戏对社交能力的促进','如何教孩子道歉和原谅',
  // 认知发展
  '4岁是"为什么"爆发期的意义','用日常生活教数学概念','想象力 vs 撒谎的区别',
  '培养专注力的自然方法','绘本阅读的互动技巧','好奇心保护比知识灌输更重要',
  // 生活习惯
  '挑食阶段的不焦虑应对','如何让孩子自己穿衣服','建立规律作息的温和方法',
  '如厕训练的常见问题','户外运动对大脑发育的影响','看动画片上瘾怎么办',
];

async function genTip(e) {
  if (e) e.stopPropagation();
  const el = document.getElementById('tipsContent');
  el.innerHTML = `<div class="generating"><span class="gen-icon">💡</span>正在生成今日育儿知识…</div>`;
  const age = getChildAgeNum();

  // Pick a specific topic, avoiding recent ones
  const recentTitles = S.tipHistory.slice(0, 10).map(t => t.title);
  const available = TIP_TOPICS.filter(t => !recentTitles.some(r => r && r.includes(t.slice(0, 6))));
  const topic = pickRandom(available.length > 3 ? available : TIP_TOPICS, 1)[0];

  try {
    const tip = await dsJSON(
      '你是专业的儿童发展心理学家和早教专家，擅长给忙碌家长提供具体、可操作、不说教的育儿建议。仅返回JSON，不含其他文字。',
      `请围绕以下具体主题，为一位忙碌的职场妈妈写一条育儿知识卡片。

主题：${topic}
孩子：${age}岁男孩，上幼儿园，目前处于自我意识发展期，有时比较倔强和对抗。妈妈精力有限。

要求：
- 标题要具体、吸引人，不要泛泛而谈（10字内）
- 内容要有具体的场景举例和话术示范（3-5句话）
- 行动建议必须是今天就能做的一件小事，不需要额外准备

${recentTitles.length ? '【重要】以下标题已经生成过，内容和角度必须完全不同：\n' + recentTitles.join('、') : ''}

JSON：{"title":"...","content":"...","actionTip":"💡 ...（今天试试：...）"}`,
      500
    );
    S.dailyTip = {date:todayStr(), starred:false, ...tip};
    const i = S.tipHistory.findIndex(t => t.date === todayStr());
    if (i >= 0) S.tipHistory[i] = S.dailyTip; else S.tipHistory.unshift(S.dailyTip);
    if (S.tipHistory.length > 60) S.tipHistory = S.tipHistory.slice(0, 60);
    save();
    renderTips();
    renderDashTipCard();
  } catch(e2) {
    el.innerHTML = errHtml('生成失败：' + e2.message, 'genTip(event)');
  }
}

function toggleStar() {
  if (!S.dailyTip) return;
  S.dailyTip.starred = !S.dailyTip.starred;
  const i = S.tipHistory.findIndex(t => t.date === S.dailyTip.date);
  if (i >= 0) S.tipHistory[i].starred = S.dailyTip.starred;
  save();
  const el = document.getElementById('tipStar');
  if (el) el.classList.toggle('on', S.dailyTip.starred);
}

function showTipModal(date) {
  const tip = S.tipHistory.find(t => t.date === date);
  if (!tip) return;
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-title">${tip.title}</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:14px">${fmtDate(tip.date)}</div>
    <div style="font-size:14px;color:var(--text2);line-height:1.9;margin-bottom:14px">${tip.content}</div>
    <div class="tip-action">${tip.actionTip}</div>
    <button class="btn btn-ghost btn-sm btn-full" onclick="closeModal()" style="margin-top:18px">关闭</button>`;
  document.getElementById('overlay').classList.add('on');
}

// ══════════════════════════════════════════
// DIARY TAB
// ══════════════════════════════════════════
function renderDiary() {
  const el = document.getElementById('diaryContent');

  // 28-day calendar
  const days28 = [];
  for (let i = 27; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    days28.push({ds, entry: S.moodLog.find(m => m.date === ds)});
  }
  const today = todayStr();
  const dayLabels = ['日','一','二','三','四','五','六'];

  const calHtml = `
    <div class="sec-title">近28天情绪</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
      ${dayLabels.map(l=>`<div style="text-align:center;font-size:9px;color:var(--text3);padding:2px 0">${l}</div>`).join('')}
    </div>
    <div class="mood-grid" style="margin-bottom:16px">
      ${days28.map(({ds,entry})=>`
        <div class="mood-cell ${ds===today?'today':''} ${entry?'has-data':''}" title="${ds}">
          ${entry ? entry.mood : ''}
        </div>`).join('')}
    </div>`;

  // Stats
  let statsHtml = '';
  if (S.moodLog.length >= 3) {
    const recent14 = S.moodLog.slice(0, 14);
    const moodCounts = {};
    const trigCounts = {};
    MOODS.forEach(m => moodCounts[m.emoji] = 0);
    recent14.forEach(m => {
      moodCounts[m.mood] = (moodCounts[m.mood]||0) + 1;
      m.triggers.forEach(t => trigCounts[t] = (trigCounts[t]||0) + 1);
    });
    const topMood  = Object.entries(moodCounts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])[0];
    const topTrig  = Object.entries(trigCounts).sort((a,b)=>b[1]-a[1])[0];
    const moodLabel = topMood ? MOODS.find(m=>m.emoji===topMood[0])?.label : '—';
    statsHtml = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-val">${topMood?.[0]||'—'}</div><div class="stat-label">常见状态 · ${moodLabel}</div></div>
        <div class="stat-card"><div class="stat-val" style="font-size:15px;font-weight:600;color:var(--text2)">${topTrig?.[0]||'—'}</div><div class="stat-label">常见场景 ${topTrig?'·'+topTrig[1]+'次':''}</div></div>
      </div>`;
  }

  // Log list
  const sorted = [...S.moodLog].sort((a,b) => b.date.localeCompare(a.date));
  const listHtml = sorted.length ? `
    <div class="sec-title" style="margin-top:4px">记录</div>
    <div class="card">
      ${sorted.map(m => {
        const mood = MOODS.find(md => md.emoji === m.mood);
        return `<div class="event-item">
          <div class="event-icon">${m.mood}</div>
          <div class="event-body">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-size:13px;font-weight:500">${mood?.label||''}</span>
              <span style="font-size:11px;color:var(--text3)">${fmtDate(m.date)}</span>
            </div>
            ${m.triggers.length ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">${m.triggers.join('、')}</div>` : ''}
            ${m.note ? `<div style="font-size:12px;color:var(--text2);margin-top:3px;font-style:italic">"${m.note}"</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>` :
    `<div class="empty"><span class="empty-icon">😊</span>还没有情绪记录<br>在首页快速记录今天的状态吧</div>`;

  // AI insight
  const insightSection = S.moodLog.length >= 7 ? `
    <div style="margin-top:16px" id="insightArea">
      <button class="btn btn-full btn-purple" onclick="genInsight()">🔮 AI 情绪规律分析</button>
    </div>` : `
    <div style="text-align:center;font-size:12px;color:var(--text3);margin-top:14px">
      记录 ${7 - S.moodLog.length} 天后可解锁 AI 情绪分析
    </div>`;

  el.innerHTML = calHtml + statsHtml + listHtml + insightSection;
}

async function genInsight() {
  const area = document.getElementById('insightArea');
  const existing = area.querySelector('.insight-box');
  if (existing) { existing.remove(); area.querySelector('button').textContent = '🔮 AI 情绪规律分析'; return; }

  const btn = area.querySelector('button');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 分析中…';

  const summary = S.moodLog.slice(0, 14)
    .map(m => `${m.date}:${m.mood}${m.triggers.length?'('+m.triggers.join(',')+')':''}${m.note?'"'+m.note+'"':''}`)
    .join('\n');
  try {
    const result = await ds(
      '你是儿童心理学专家，帮助家长理解孩子情绪规律。语气温和实用，不说教。',
      `孩子最近情绪记录：\n${summary}\n\n请用150字以内分析：1.主要情绪规律 2.常见触发场景 3.给妈妈的2条具体可操作建议（要简短）`,
      400
    );
    const box = document.createElement('div');
    box.className = 'insight-box fade-up';
    box.innerHTML = `<div class="insight-title">🔮 AI 情绪洞察</div>${result}`;
    area.appendChild(box);
    btn.disabled = false; btn.textContent = '收起分析 ↑';
  } catch(e) { btn.disabled = false; btn.textContent = '🔮 AI 分析（失败，重试）'; }
}

// ══════════════════════════════════════════
// RECORDS TAB
// ══════════════════════════════════════════
let recFilter = 'all';
let selCat = null, selSymptoms = new Set();

function renderRecords() {
  const el = document.getElementById('recordsContent');
  const filtered = recFilter === 'all' ? S.events : S.events.filter(e => e.category === recFilter);
  const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date));

  const filters = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="filter-row" style="margin:0;flex:1">
        ${['all','生病','疫苗','里程碑','其他'].map(c=>`
          <button class="tag-chip ${recFilter===c?'on':''}" onclick="setRecFilter('${c}')">
            ${c==='all'?'全部':CAT_ICON[c]+' '+c}
          </button>`).join('')}
      </div>
      <button class="btn btn-sm" onclick="openAddEvent()" style="flex-shrink:0;margin-left:8px">+ 添加</button>
    </div>`;

  const list = sorted.length ? `
    <div class="card">
      ${sorted.map(e=>`
        <div class="event-item">
          <div class="event-icon">${CAT_ICON[e.category]||'📋'}</div>
          <div class="event-body">
            <div class="event-title">${e.description}</div>
            <div class="event-meta">${fmtDate(e.date)} · ${e.category}</div>
            ${e.symptoms?.length ? `<div class="event-symptom-tags">${e.symptoms.map(s=>`<span class="s-tag">${s}</span>`).join('')}</div>` : ''}
            ${e.vaccineName ? `<div style="font-size:11px;color:var(--blue);margin-top:3px">💉 ${e.vaccineName}</div>` : ''}
            ${e.note ? `<div style="font-size:12px;color:var(--text3);margin-top:3px;font-style:italic">${e.note}</div>` : ''}
          </div>
          <button class="del-btn" onclick="delEvent('${e.id}')">×</button>
        </div>`).join('')}
    </div>` :
    `<div class="empty"><span class="empty-icon">📋</span>暂无记录</div>`;

  el.innerHTML = filters + list;
}

function setRecFilter(cat) { recFilter = cat; renderRecords(); }

function delEvent(id) {
  if (!confirm('确认删除这条记录？')) return;
  S.events = S.events.filter(e => e.id !== id);
  save(); renderRecords(); renderDashEvents();
}

function openAddEvent() {
  selCat = null; selSymptoms = new Set();
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-title">添加记录</div>
    <div class="form-section">
      <div class="form-label">类型</div>
      <div class="cat-grid" id="catGrid">
        ${[['生病','🏥'],['疫苗','💉'],['里程碑','🎯'],['其他','📋']].map(([c,ic])=>`
          <button class="cat-btn" onclick="pickCat('${c}',this)">${ic} ${c}</button>`).join('')}
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">日期</label>
      <input class="input" id="evDate" type="date" value="${todayStr()}">
    </div>
    <div id="symptomSec" style="display:none" class="form-section">
      <div class="form-label">症状（可多选）</div>
      <div class="tag-grid">
        ${['发烧','咳嗽','流鼻涕','腹泻','呕吐','过敏','皮疹','其他'].map(s=>`
          <button class="tag-chip" onclick="togSymptom('${s}',this)">${s}</button>`).join('')}
      </div>
    </div>
    <div id="vaccineSec" style="display:none" class="form-section">
      <label class="form-label">疫苗名称</label>
      <input class="input" id="vaccineName" placeholder="如：流感疫苗、水痘疫苗、HPV">
    </div>
    <div class="form-section">
      <label class="form-label">描述 <span style="font-weight:400;color:var(--text3)">（必填）</span></label>
      <input class="input" id="evDesc" placeholder="简短记录一下">
    </div>
    <div class="form-section">
      <label class="form-label">备注 <span style="font-weight:400;color:var(--text3)">（选填）</span></label>
      <input class="input" id="evNote" placeholder="其他想记的细节">
    </div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()" style="flex:1">取消</button>
      <button class="btn btn-sm" onclick="saveEvent()" style="flex:2">保存记录</button>
    </div>`;
  document.getElementById('overlay').classList.add('on');
}

function pickCat(cat, btn) {
  selCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('symptomSec').style.display = cat === '生病' ? 'block' : 'none';
  document.getElementById('vaccineSec').style.display = cat === '疫苗' ? 'block' : 'none';
}

function togSymptom(s, el) {
  selSymptoms.has(s) ? (selSymptoms.delete(s), el.classList.remove('on')) : (selSymptoms.add(s), el.classList.add('on'));
}

function saveEvent() {
  const desc = document.getElementById('evDesc')?.value.trim();
  if (!desc) { alert('请填写描述'); return; }
  if (!selCat) { alert('请选择类型'); return; }
  const event = {
    id: Date.now().toString(),
    date: document.getElementById('evDate').value || todayStr(),
    category: selCat, description: desc,
    note: document.getElementById('evNote')?.value.trim() || '',
    symptoms: selCat === '生病' ? [...selSymptoms] : [],
    vaccineName: selCat === '疫苗' ? (document.getElementById('vaccineName')?.value.trim() || '') : '',
  };
  S.events.unshift(event);
  save(); closeModal(); renderRecords(); renderDashEvents();
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function closeModal() { document.getElementById('overlay').classList.remove('on'); }

// ══════════════════════════════════════════
// SHARED ERROR HTML
// ══════════════════════════════════════════
function errHtml(msg, retryFn) {
  return `<div class="empty"><span class="empty-icon">⚠️</span>${msg}<br><button class="btn btn-sm" onclick="${retryFn}" style="margin-top:14px">重试</button></div>`;
}

// ══════════════════════════════════════════
load();
if (S.key) {
  document.getElementById('view-setup').style.display = 'none';
  document.getElementById('app-main').style.display = 'flex';
  updateHeader();
  updateTokenDisplay();
  renderDash();
} else {
  // Pre-fill birthday hint for July baby ~4 years old
  const bdayEl = document.getElementById('setupBday');
  if (bdayEl) bdayEl.value = (new Date().getFullYear() - 4) + '-07-15';
}
